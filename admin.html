<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — GatePass Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!Auth.requireRole(CONFIG.ROLES.ADMIN)) throw new Error('Unauthorized');

        async function initPage() {
            const today = new Date().toISOString().split('T')[0];
            const content = `
                <div class="space-y-6">
                    <!-- Tabs -->
                    <div class="flex border-b border-gray-200 overflow-x-auto">
                        <button onclick="switchAdminTab('users')" id="atab-users"
                            class="admin-tab px-5 py-3 text-sm font-medium border-b-2 border-emerald-500 text-emerald-600 transition-colors whitespace-nowrap">
                            Create User
                        </button>
                        <button onclick="switchAdminTab('staff')" id="atab-staff"
                            class="admin-tab px-5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">
                            Staff Management
                        </button>
                        <button onclick="switchAdminTab('settings')" id="atab-settings"
                            class="admin-tab px-5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">
                            System Settings
                        </button>
                        <button onclick="switchAdminTab('audit')" id="atab-audit"
                            class="admin-tab px-5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">
                            Audit Logs
                        </button>
                    </div>

                    <!-- Create User Panel -->
                    <div id="apanel-users" class="admin-panel">
                        <div class="max-w-2xl mx-auto">
                            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 lg:p-8">
                                <div class="mb-6">
                                    <h3 class="text-lg font-semibold text-gray-800">Create New User Account</h3>
                                    <p class="text-sm text-gray-500 mt-1">Create a new Host or Security account. A secure password will be auto-generated and emailed to the user.</p>
                                </div>
                                <form id="createUserForm" class="space-y-4">
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                                            <input type="text" id="cuFirstName" required
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="John">
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                                            <input type="text" id="cuLastName" required
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="Doe">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                        <input type="text" id="cuUserName" required
                                            class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                            placeholder="johndoe">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                        <input type="email" id="cuEmail" required
                                            class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                            placeholder="user@example.com">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                                        <input type="tel" id="cuPhone" required
                                            class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                            placeholder="+234 800 000 0000">
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                                            <select id="cuRole" required
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm bg-white">
                                                <option value="">Select role</option>
                                                <option value="Host">Host</option>
                                                <option value="Security">Security</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Department Code <span class="text-gray-400 text-xs">(optional)</span></label>
                                            <input type="text" id="cuDeptCode"
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="e.g. IT-001">
                                        </div>
                                    </div>
                                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 flex items-start gap-2">
                                        <svg class="w-5 h-5 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <p class="text-sm text-blue-700">Login credentials will be automatically generated and sent to the user's email address.</p>
                                    </div>
                                    <button type="submit" id="createUserBtn"
                                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm mt-2">
                                        Create Account
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Staff Management Panel -->
                    <div id="apanel-staff" class="admin-panel hidden">
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-100">
                                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-semibold text-gray-800">Staff Users</h3>
                                        <p class="text-sm text-gray-500">Manage Host and Security staff accounts</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <select id="staffRoleFilter" onchange="loadStaffUsers()"
                                            class="form-input px-3 py-1.5 border border-gray-300 rounded-lg text-sm bg-white">
                                            <option value="">All Staff</option>
                                            <option value="Host">Host</option>
                                            <option value="Security">Security</option>
                                        </select>
                                        <button onclick="loadStaffUsers()" class="px-4 py-1.5 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition-colors">
                                            Refresh
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Username</th>
                                            <th>Email</th>
                                            <th>Phone</th>
                                            <th>Role</th>
                                            <th>Department</th>
                                            <th>Created</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="staffTableBody">
                                        <tr>
                                            <td colspan="8" class="text-center py-8 text-gray-400">Loading staff users...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Edit Staff Modal -->
                    <div id="editStaffModal" class="fixed inset-0 z-[60] hidden">
                        <div class="fixed inset-0 bg-black/50" onclick="closeEditModal()"></div>
                        <div class="fixed inset-0 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg relative">
                                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                                    <h3 class="text-lg font-semibold text-gray-800">Edit Staff User</h3>
                                    <button onclick="closeEditModal()" class="p-1 hover:bg-gray-100 rounded-lg transition-colors">
                                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                        </svg>
                                    </button>
                                </div>
                                <form id="editStaffForm" class="p-6 space-y-4">
                                    <input type="hidden" id="editStaffId">
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                                            <input type="text" id="editFirstName"
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="First Name">
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                                            <input type="text" id="editLastName"
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="Last Name">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                                        <input type="tel" id="editPhoneNumber"
                                            class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                            placeholder="+234 800 000 0000">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Department Code</label>
                                        <input type="text" id="editDeptCode"
                                            class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                            placeholder="e.g. IT-001">
                                    </div>
                                    <div class="flex gap-3 pt-2">
                                        <button type="button" onclick="closeEditModal()"
                                            class="flex-1 px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                                            Cancel
                                        </button>
                                        <button type="submit" id="editStaffBtn"
                                            class="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition-colors">
                                            Save Changes
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Delete Confirmation Modal -->
                    <div id="deleteStaffModal" class="fixed inset-0 z-[60] hidden">
                        <div class="fixed inset-0 bg-black/50" onclick="closeDeleteModal()"></div>
                        <div class="fixed inset-0 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md relative">
                                <div class="p-6 text-center">
                                    <div class="w-14 h-14 mx-auto mb-4 bg-red-100 rounded-full flex items-center justify-center">
                                        <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </div>
                                    <h3 class="text-lg font-semibold text-gray-800 mb-2">Delete Staff User</h3>
                                    <p class="text-sm text-gray-500 mb-1">Are you sure you want to delete this user?</p>
                                    <p id="deleteStaffName" class="text-sm font-medium text-gray-700 mb-6"></p>
                                    <input type="hidden" id="deleteStaffId">
                                    <div class="flex gap-3">
                                        <button onclick="closeDeleteModal()"
                                            class="flex-1 px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                                            Cancel
                                        </button>
                                        <button onclick="confirmDeleteStaff()" id="deleteStaffBtn"
                                            class="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Settings Panel -->
                    <div id="apanel-settings" class="admin-panel hidden">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <!-- Settings List -->
                            <div class="lg:col-span-2">
                                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div class="px-6 py-4 border-b border-gray-100">
                                        <h3 class="text-lg font-semibold text-gray-800">Current Settings</h3>
                                        <p class="text-sm text-gray-500">View and manage system configuration</p>
                                    </div>
                                    <div id="settingsList" class="p-4">
                                        <div class="text-center py-8 text-gray-400">
                                            <svg class="w-8 h-8 mx-auto mb-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                                            Loading...
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Update Setting Form -->
                            <div>
                                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Update Setting</h3>
                                    <form id="settingForm" class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Key</label>
                                            <input type="text" id="settingKey" required
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="e.g. MaxVisitDuration">
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-1">Value</label>
                                            <input type="text" id="settingValue" required
                                                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                                                placeholder="e.g. 8">
                                        </div>
                                        <button type="submit" id="settingBtn"
                                            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
                                            Update Setting
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Audit Logs Panel -->
                    <div id="apanel-audit" class="admin-panel hidden">
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-100">
                                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-semibold text-gray-800">Audit Logs</h3>
                                        <p class="text-sm text-gray-500">Track system activity and changes</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <div>
                                            <label class="block text-xs font-medium text-gray-500 mb-1">Start Date</label>
                                            <input type="date" id="auditStartDate" value="${today}"
                                                class="form-input px-3 py-1.5 border border-gray-300 rounded-lg text-sm">
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-gray-500 mb-1">End Date</label>
                                            <input type="date" id="auditEndDate" value="${today}"
                                                class="form-input px-3 py-1.5 border border-gray-300 rounded-lg text-sm">
                                        </div>
                                        <div class="self-end">
                                            <button onclick="loadAuditLogs()" id="auditLoadBtn"
                                                class="px-4 py-1.5 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition-colors">
                                                Filter
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>Timestamp</th>
                                            <th>Action</th>
                                            <th>User</th>
                                            <th>Details</th>
                                        </tr>
                                    </thead>
                                    <tbody id="auditTableBody">
                                        <tr>
                                            <td colspan="4" class="text-center py-8 text-gray-400">Click "Filter" to load audit logs</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            UI.renderLayout('admin', 'Admin Panel', content);
            attachHandlers();
            loadSettings();
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.admin-tab').forEach(b => {
                b.classList.remove('border-emerald-500', 'text-emerald-600');
                b.classList.add('border-transparent', 'text-gray-500');
            });
            document.getElementById(`apanel-${tab}`).classList.remove('hidden');
            const activeTab = document.getElementById(`atab-${tab}`);
            activeTab.classList.remove('border-transparent', 'text-gray-500');
            activeTab.classList.add('border-emerald-500', 'text-emerald-600');

            if (tab === 'staff') {
                loadStaffUsers();
            }
        }

        async function loadSettings() {
            const listDiv = document.getElementById('settingsList');
            try {
                const result = await API.admin.getSettings();
                if (result.succeeded && result.data) {
                    const settings = Array.isArray(result.data) ? result.data : [result.data];
                    if (settings.length === 0) {
                        listDiv.innerHTML = `<p class="text-center py-8 text-gray-400">No settings configured</p>`;
                        return;
                    }
                    listDiv.innerHTML = `<div class="space-y-2">${settings.map(s => `
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors cursor-pointer" onclick="fillSetting('${s.key || s.settingKey || ''}', '${s.value || s.settingValue || ''}')">
                            <div>
                                <p class="font-medium text-gray-800 font-mono text-sm">${s.key || s.settingKey || '—'}</p>
                                <p class="text-xs text-gray-500 mt-0.5">Click to edit</p>
                            </div>
                            <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium">${s.value || s.settingValue || '—'}</span>
                        </div>
                    `).join('')}</div>`;
                }
            } catch (err) {
                listDiv.innerHTML = `<p class="text-center py-4 text-red-500 text-sm">Failed to load settings</p>`;
            }
        }

        function fillSetting(key, value) {
            document.getElementById('settingKey').value = key;
            document.getElementById('settingValue').value = value;
            document.getElementById('settingValue').focus();
        }

        // ---- Staff Management Functions ----
        async function loadStaffUsers() {
            const tbody = document.getElementById('staffTableBody');
            const roleFilter = document.getElementById('staffRoleFilter')?.value || '';

            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-gray-400">
                <svg class="w-8 h-8 mx-auto mb-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                Loading staff users...</td></tr>`;

            try {
                const result = await API.admin.getStaffUsers(roleFilter || null);
                if (result.succeeded && result.data) {
                    const users = Array.isArray(result.data) ? result.data : [];
                    if (users.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-gray-400">No staff users found</td></tr>`;
                        return;
                    }
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td class="whitespace-nowrap font-medium text-gray-800">${u.firstName || ''} ${u.lastName || ''}</td>
                            <td>${u.userName || '—'}</td>
                            <td>${u.email || '—'}</td>
                            <td>${u.phoneNumber || '—'}</td>
                            <td>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${u.roleName === 'Host' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}">
                                    ${u.roleName || '—'}
                                </span>
                            </td>
                            <td>${u.departmentName || u.departmentCode || '—'}</td>
                            <td class="whitespace-nowrap">${UI.formatDate(u.createdAt)}</td>
                            <td class="whitespace-nowrap">
                                <div class="flex items-center gap-2">
                                    <button onclick="openEditModal('${u.id}', '${(u.firstName || '').replace(/'/g, "\\'")}', '${(u.lastName || '').replace(/'/g, "\\'")}', '${u.phoneNumber || ''}', '${u.departmentCode || ''}')"
                                        class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Edit">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                        </svg>
                                    </button>
                                    <button onclick="openDeleteModal('${u.id}', '${(u.firstName || '').replace(/'/g, "\\'")} ${(u.lastName || '').replace(/'/g, "\\'")}')"
                                        class="p-1.5 text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Delete">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-red-500 text-sm">Failed to load staff users</td></tr>`;
                UI.handleError(err);
            }
        }

        function openEditModal(id, firstName, lastName, phone, deptCode) {
            document.getElementById('editStaffId').value = id;
            document.getElementById('editFirstName').value = firstName;
            document.getElementById('editLastName').value = lastName;
            document.getElementById('editPhoneNumber').value = phone;
            document.getElementById('editDeptCode').value = deptCode;
            document.getElementById('editStaffModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editStaffModal').classList.add('hidden');
            document.getElementById('editStaffForm').reset();
        }

        function openDeleteModal(id, name) {
            document.getElementById('deleteStaffId').value = id;
            document.getElementById('deleteStaffName').textContent = name;
            document.getElementById('deleteStaffModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('deleteStaffModal').classList.add('hidden');
        }

        async function confirmDeleteStaff() {
            const btn = document.getElementById('deleteStaffBtn');
            const userId = document.getElementById('deleteStaffId').value;
            UI.btnLoading(btn, true);

            try {
                const result = await API.admin.deleteStaffUser(userId);
                if (result.succeeded) {
                    UI.toast('Staff user deleted successfully!', 'success');
                    closeDeleteModal();
                    loadStaffUsers();
                } else {
                    UI.toast(result.message || 'Failed to delete user.', 'error');
                }
            } catch (err) {
                UI.handleError(err);
            } finally {
                UI.btnLoading(btn, false);
            }
        }

        async function loadAuditLogs() {
            const tbody = document.getElementById('auditTableBody');
            const startDate = document.getElementById('auditStartDate').value;
            const endDate = document.getElementById('auditEndDate').value;

            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-400">
                <svg class="w-8 h-8 mx-auto mb-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                Loading...</td></tr>`;

            try {
                const result = await API.admin.getAuditLogs(startDate || null, endDate || null);
                if (result.succeeded && result.data) {
                    const logs = Array.isArray(result.data) ? result.data : [];
                    if (logs.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-400">No audit logs found for the selected period</td></tr>`;
                        return;
                    }
                    tbody.innerHTML = logs.map(log => `
                        <tr>
                            <td class="whitespace-nowrap">${UI.formatDateTime(log.timestamp || log.createdAt || log.date)}</td>
                            <td>
                                <span class="badge bg-blue-100 text-blue-700">${log.action || log.actionType || '—'}</span>
                            </td>
                            <td>${log.userName || log.performedBy || '—'}</td>
                            <td class="max-w-xs truncate">${log.details || log.description || '—'}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-red-500 text-sm">Failed to load audit logs</td></tr>`;
                UI.handleError(err);
            }
        }

        function attachHandlers() {
            // Create User form
            document.getElementById('createUserForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const btn = document.getElementById('createUserBtn');
                UI.btnLoading(btn, true);

                try {
                    const result = await API.admin.createUser({
                        userName: document.getElementById('cuUserName').value.trim(),
                        email: document.getElementById('cuEmail').value.trim(),
                        firstName: document.getElementById('cuFirstName').value.trim(),
                        lastName: document.getElementById('cuLastName').value.trim(),
                        phoneNumber: document.getElementById('cuPhone').value.trim(),
                        roleName: document.getElementById('cuRole').value,
                        departmentCode: document.getElementById('cuDeptCode').value.trim() || null,
                    });

                    if (result.succeeded) {
                        UI.toast('User created successfully! Login credentials have been sent to their email.', 'success');
                        document.getElementById('createUserForm').reset();
                        // Refresh staff list if it has been loaded
                        if (document.getElementById('staffTableBody')) {
                            loadStaffUsers();
                        }
                    } else {
                        UI.toast(result.message || 'Failed to create user.', 'error');
                    }
                } catch (err) {
                    UI.handleError(err);
                } finally {
                    UI.btnLoading(btn, false);
                }
            });

            // Edit Staff form
            document.getElementById('editStaffForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('editStaffBtn');
                const userId = document.getElementById('editStaffId').value;
                UI.btnLoading(btn, true);

                try {
                    const data = {};
                    const firstName = document.getElementById('editFirstName').value.trim();
                    const lastName = document.getElementById('editLastName').value.trim();
                    const phoneNumber = document.getElementById('editPhoneNumber').value.trim();
                    const deptCode = document.getElementById('editDeptCode').value.trim();

                    if (firstName) data.firstName = firstName;
                    if (lastName) data.lastName = lastName;
                    if (phoneNumber) data.phoneNumber = phoneNumber;
                    if (deptCode) data.departmentCode = deptCode;

                    const result = await API.admin.updateStaffUser(userId, data);
                    if (result.succeeded) {
                        UI.toast('Staff user updated successfully!', 'success');
                        closeEditModal();
                        loadStaffUsers();
                    } else {
                        UI.toast(result.message || 'Failed to update user.', 'error');
                    }
                } catch (err) {
                    UI.handleError(err);
                } finally {
                    UI.btnLoading(btn, false);
                }
            });

            // Update Setting form
            document.getElementById('settingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('settingBtn');
                UI.btnLoading(btn, true);

                try {
                    const user = Auth.getUser();
                    const result = await API.admin.updateSetting({
                        key: document.getElementById('settingKey').value.trim(),
                        value: document.getElementById('settingValue').value.trim(),
                        updatedByUserId: null,
                    });

                    if (result.succeeded) {
                        UI.toast('Setting updated successfully!', 'success');
                        document.getElementById('settingForm').reset();
                        loadSettings();
                    } else {
                        UI.toast(result.message || 'Failed to update setting.', 'error');
                    }
                } catch (err) {
                    UI.handleError(err);
                } finally {
                    UI.btnLoading(btn, false);
                }
            });
        }

        initPage();
    </script>
</body>
</html>
