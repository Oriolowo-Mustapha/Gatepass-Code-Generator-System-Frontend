<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — GatePass Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!Auth.requireAuth()) throw new Error('Not authenticated');

        async function initDashboard() {
            const user = Auth.getUser();
            const role = user?.roleName;

            let quickActions = '';

            if (role === CONFIG.ROLES.ADMIN) {
                quickActions = `
                    <a href="gatepass.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Create Gatepass</h3>
                                <p class="text-sm text-gray-500">Issue a new gatepass request</p>
                            </div>
                        </div>
                    </a>
                    <a href="organization.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Organization</h3>
                                <p class="text-sm text-gray-500">Manage departments & access points</p>
                            </div>
                        </div>
                    </a>
                    <a href="admin.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Admin Panel</h3>
                                <p class="text-sm text-gray-500">Settings & audit logs</p>
                            </div>
                        </div>
                    </a>
                    <a href="reports.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Reports</h3>
                                <p class="text-sm text-gray-500">View stats & visitor logs</p>
                            </div>
                        </div>
                    </a>`;
            } else if (role === CONFIG.ROLES.SECURITY) {
                quickActions = `
                    <a href="security.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Verify Gatepass</h3>
                                <p class="text-sm text-gray-500">Scan or enter gatepass code</p>
                            </div>
                        </div>
                    </a>
                    <a href="security.html#checkin" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Check In</h3>
                                <p class="text-sm text-gray-500">Register visitor arrival</p>
                            </div>
                        </div>
                    </a>
                    <a href="security.html#checkout" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Check Out</h3>
                                <p class="text-sm text-gray-500">Register visitor departure</p>
                            </div>
                        </div>
                    </a>`;
            } else if (role === CONFIG.ROLES.HOST) {
                quickActions = `
                    <a href="gatepass.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Create Gatepass</h3>
                                <p class="text-sm text-gray-500">Issue a new gatepass request</p>
                            </div>
                        </div>
                    </a>
                    <a href="reports.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Reports</h3>
                                <p class="text-sm text-gray-500">View your stats & visitor logs</p>
                            </div>
                        </div>
                    </a>`;
            } else {
                quickActions = `
                    <a href="gatepass.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Create Gatepass</h3>
                                <p class="text-sm text-gray-500">Issue a new gatepass request</p>
                            </div>
                        </div>
                    </a>
                    <a href="reports.html" class="stat-card bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Reports</h3>
                                <p class="text-sm text-gray-500">View stats & visitor logs</p>
                            </div>
                        </div>
                    </a>`;
            }

            let statsHtml = '';
            try {
                let statsResult;
                if (role === CONFIG.ROLES.ADMIN) {
                    statsResult = await API.reports.getAdminStatistics();
                } else if (role === CONFIG.ROLES.HOST) {
                    statsResult = await API.reports.getHostStatistics();
                } else if (role === CONFIG.ROLES.SECURITY) {
                    statsResult = await API.reports.getSecurityStatistics();
                }

                if (statsResult && statsResult.succeeded && statsResult.data) {
                    const s = statsResult.data;
                    let cards = '';

                    if (role === CONFIG.ROLES.ADMIN) {
                        cards = `
                            ${dashStatCard('Approved Requests', s.totalApprovedRequests ?? 0, 'emerald', 'M5 13l4 4L19 7')}
                            ${dashStatCard('Visitors Today', s.totalVisitorsToday ?? 0, 'blue', 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z')}
                            ${dashStatCard('Pending Requests', s.totalPendingRequests ?? 0, 'amber', 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')}
                            ${dashStatCard('Rejected Requests', s.totalRejectedRequests ?? 0, 'red', 'M6 18L18 6M6 6l12 12')}
                            ${dashStatCard('Access Points', s.totalAccessPoints ?? 0, 'purple', 'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z')}
                            ${dashStatCard('Departments', s.totalDepartments ?? 0, 'indigo', 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5')}
                            ${dashStatCard('Total Hosts', s.totalHosts ?? 0, 'teal', 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197')}
                            ${dashStatCard('Total Security', s.totalSecurity ?? 0, 'slate', 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z')}`;
                    } else if (role === CONFIG.ROLES.HOST) {
                        cards = `
                            ${dashStatCard('Requests Today', s.totalRequestsToday ?? 0, 'blue', 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z')}
                            ${dashStatCard('All-Time Requests', s.totalRequestsAllTime ?? 0, 'purple', 'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10')}
                            ${dashStatCard('Visitors Today', s.totalVisitorsToday ?? 0, 'teal', 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z')}
                            ${dashStatCard('Approved', s.totalApprovedRequests ?? 0, 'emerald', 'M5 13l4 4L19 7')}
                            ${dashStatCard('Pending', s.totalPendingRequests ?? 0, 'amber', 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')}
                            ${dashStatCard('Rejected', s.totalRejectedRequests ?? 0, 'red', 'M6 18L18 6M6 6l12 12')}`;
                    } else if (role === CONFIG.ROLES.SECURITY) {
                        cards = `
                            ${dashStatCard('Visitors Today', s.totalVisitorsToday ?? 0, 'blue', 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z')}
                            ${dashStatCard('Check-Ins Today', s.totalCheckInsToday ?? 0, 'emerald', 'M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1')}
                            ${dashStatCard('Check-Outs Today', s.totalCheckOutsToday ?? 0, 'red', 'M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1')}`;

                        if (s.countByGatepassType && Object.keys(s.countByGatepassType).length > 0) {
                            for (const [type, count] of Object.entries(s.countByGatepassType)) {
                                cards += dashStatCard(type, count, 'slate', 'M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z');
                            }
                        }
                    }

                    statsHtml = `
                    <div class="mt-8">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">${role} Statistics</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            ${cards}
                        </div>
                    </div>`;
                }
            } catch {
            }

            const content = `
                <!-- Welcome Banner -->
                <div class="bg-gradient-to-r from-emerald-600 to-teal-600 rounded-2xl p-6 lg:p-8 text-white mb-8">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                        <div>
                            <h2 class="text-2xl lg:text-3xl font-bold">Good ${getGreeting()}, ${user?.userName || 'User'}!</h2>
                            <p class="text-emerald-100 mt-1">Welcome to the GatePass Code Generator System. Here's what you can do today.</p>
                        </div>
                        <div class="flex items-center gap-2 bg-white/20 rounded-lg px-4 py-2 text-sm backdrop-blur-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Quick Actions</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        ${quickActions}
                    </div>
                </div>

                ${statsHtml}

                <!-- System Info -->
                <div class="mt-8 bg-white rounded-xl border border-gray-100 shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">System Information</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Logged in as</p>
                                <p class="text-sm font-medium text-gray-800">${user?.userName || '—'}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Email</p>
                                <p class="text-sm font-medium text-gray-800">${user?.email || '—'}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Role</p>
                                <p class="text-sm font-medium text-gray-800">${role || '—'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            UI.renderLayout('dashboard', 'Dashboard', content);
        }

        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return 'Morning';
            if (hour < 17) return 'Afternoon';
            return 'Evening';
        }

        function dashStatCard(label, value, color, iconPath) {
            return `
                <div class="stat-card bg-white rounded-xl p-5 border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">${label}</p>
                            <p class="text-2xl font-bold text-gray-800 mt-1">${value}</p>
                        </div>
                        <div class="w-10 h-10 bg-${color}-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-${color}-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${iconPath}"/></svg>
                        </div>
                    </div>
                </div>`;
        }

        initDashboard();
    </script>
</body>
</html>
