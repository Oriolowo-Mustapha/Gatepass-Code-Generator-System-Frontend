<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — GatePass Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="auth-bg flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500 rounded-2xl mb-4 shadow-lg shadow-emerald-500/30">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">GatePass</h1>
            <p class="text-slate-400 mt-1">Code Generator System</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Reset Your Password</h2>
            <p class="text-gray-500 text-sm mb-6">Enter your email, reset token, and new password</p>

            <form id="resetForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" required
                        class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                        placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Reset Token</label>
                    <input type="text" id="token" required
                        class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                        placeholder="Paste the token from your email">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" id="newPassword" required minlength="6"
                        class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                        placeholder="Minimum 6 characters">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required
                        class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm"
                        placeholder="Re-enter your new password">
                </div>

                <button type="submit" id="resetBtn"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors duration-200 text-sm">
                    Reset Password
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                <a href="index.html" class="text-emerald-600 hover:text-emerald-700 font-semibold inline-flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Sign In
                </a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Pre-fill email and token from URL params if present
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('email')) document.getElementById('email').value = urlParams.get('email');
        if (urlParams.get('token')) document.getElementById('token').value = urlParams.get('token');

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                UI.toast('Passwords do not match.', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            UI.btnLoading(btn, true);

            try {
                const result = await API.auth.resetPassword({
                    email: document.getElementById('email').value.trim(),
                    token: document.getElementById('token').value.trim(),
                    newPassword: newPassword,
                });

                if (result.succeeded) {
                    UI.toast('Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    UI.toast(result.message || 'Password reset failed.', 'error');
                }
            } catch (err) {
                UI.handleError(err);
            } finally {
                UI.btnLoading(btn, false);
            }
        });
    </script>
</body>
</html>
